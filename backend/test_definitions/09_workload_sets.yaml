tests:
- id: workload-sets-update-latest-exe
  category: Workload Sets
  title: Update to latest workload set (exe)
  description: Install MAUI, switch to workload-set mode, and update to the latest
    workload set
  machine_mutating: true
  steps:
  - type: command
    command: dotnet workload search version
  - type: command
    command: dotnet workload --info
  - type: command
    command: dotnet workload list
  - type: command
    command: dotnet workload install maui
    timeout: 600
  - type: command
    command: dotnet workload --info
  - type: command
    command: dotnet workload list
  - type: command
    command: dotnet workload config --update-mode workload-set
  - type: command
    command: dotnet workload update
    timeout: 600
  - type: command
    command: dotnet workload --info
  - type: command
    command: dotnet workload list
  sort_order: 23
- id: workload-sets-update-specific-exe
  category: Workload Sets
  title: Update to specific workload set (exe)
  description: Switch to manifest mode, update workloads, and inspect workload version
    information
  machine_mutating: true
  steps:
  - type: command
    command: dotnet workload config --update-mode manifests
  - type: command
    command: dotnet workload update
    timeout: 600
  - type: command
    command: dotnet workload --info
  - type: command
    command: dotnet workload list
  - type: command
    command: dotnet workload search version
  sort_order: 24
- id: workload-sets-pin-specific-exe
  category: Workload Sets
  title: Pin to specific workload set (exe)
  description: Create a global.json and inspect workload state after updating
  machine_mutating: true
  steps:
  - type: command
    command: mkdir MyTest
  - type: command
    command: cd MyTest
  - type: command
    command: dotnet new global.json
  - type: command
    command: dotnet workload update
    timeout: 600
  - type: command
    command: dotnet workload list
  - type: command
    command: dotnet workload --info
  sort_order: 25
- id: workload-sets-install-specific-version-exe
  category: Workload Sets
  title: Install workload with specific version (exe)
  description: Inspect workload versions and installed workloads for a specific-version
    install scenario
  machine_mutating: true
  steps:
  - type: command
    command: dotnet workload search version
  - type: command
    command: dotnet workload list
  - type: command
    command: dotnet workload --info
  sort_order: 26
- id: workload-sets-update-different-band-exe
  category: Workload Sets
  title: Update workload sets from different band (exe)
  description: Switch to manifest mode, update, and inspect workload information
  machine_mutating: true
  steps:
  - type: command
    command: dotnet workload config --update-mode manifests
  - type: command
    command: dotnet workload update
    timeout: 600
  - type: command
    command: dotnet workload --info
  - type: command
    command: dotnet workload list
  sort_order: 27
- id: workload-sets-switch-back-manifests-exe
  category: Workload Sets
  title: Switch back to loose manifests (exe)
  description: Switch update mode back to manifests, update, and inspect workload
    information
  machine_mutating: true
  steps:
  - type: command
    command: dotnet workload config --update-mode manifests
  - type: command
    command: dotnet workload update
    timeout: 600
  - type: command
    command: dotnet workload --info
  - type: command
    command: dotnet workload list
  sort_order: 28
