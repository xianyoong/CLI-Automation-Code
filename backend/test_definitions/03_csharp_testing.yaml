tests:
- id: cs-05a-xunit-failing-suite
  category: C# Testing
  title: 5a. xUnit
  description: Create an xUnit project with passing, failing, and skipped tests
  steps:
  - type: command
    command: dotnet new xunit -n x
  - type: command
    command: cd x
  - type: write_file
    path: UnitTest1.cs
    content: |
      namespace Myxunit;
      
      public class UnitTest1
      {
          [Fact]
          public void TestPass()
          {
              Assert.True(true);
          }
      
          [Fact]
          public void TestFail()
          {
              Assert.True(false);
          }
      
          [Fact(Skip = "Skipping this test for now")]
          public void TestSkip()
          {
              Assert.True(true);
          }
      }
  - type: command
    command: dotnet build
  - type: command
    command: dotnet restore
  - type: command
    command: dotnet test
    expected_exit_code: 1
  sort_order: 5
- id: cs-05b-nunit-failing-suite
  category: C# Testing
  title: 5b. NUnit
  description: Create an NUnit project with passing, failing, and skipped tests
  steps:
  - type: command
    command: dotnet new nunit -n n
  - type: command
    command: cd n
  - type: write_file
    path: UnitTest1.cs
    content: |
      namespace Mynunit
      {
          public class Tests
          {
              [SetUp]
              public void Setup()
              {
              }

              [Test]
              public void Test_Pass()
              {
                  Assert.Pass("This test passed");
              }

              [Test]
              public void Test_Fail()
              {
                  Assert.Fail("This test failed");
              }

              [Test]
              [Ignore("This test is skipped")]
              public void Test_Skip()
              {
                  Assert.Pass("This test is skipped");
              }
          }
      }
  - type: command
    command: dotnet build
  - type: command
    command: dotnet restore
  - type: command
    command: dotnet test
    expected_exit_code: 1
  sort_order: 6
- id: cs-05c-mstest-failing-suite
  category: C# Testing
  title: 5c. MSTest
  description: Create an MSTest project with passing, failing, and inconclusive tests
  steps:
  - type: command
    command: dotnet new mstest -n m
  - type: command
    command: cd m
  - type: write_file
    path: Test1.cs
    content: |
      namespace Mymstest;
      
      [TestClass]
      public sealed class Test1
      {
          [TestMethod]
          public void TestMethod1()
          {
              Assert.AreEqual(12, 11);
          }
      
          [TestMethod]
          public void TestMethod2()
          {
              Assert.AreEqual(11, 11);
          }
      
          [TestMethod]
          public void TestMethod3()
          {
              Assert.Inconclusive();
          }
      }
  - type: command
    command: dotnet restore
  - type: command
    command: dotnet test
    expected_exit_code: 1
  sort_order: 7
