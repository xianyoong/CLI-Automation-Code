tests:
  - id: color-test-demo
    category: "Demo"
    title: "Color Output Test"
    description: "Tests that ANSI colors render correctly in the log viewer"
    machine_mutating: false
    sort_order: 0
    steps:
      - type: command
        command: "powershell -Command \"Write-Host '✓ GREEN - Success message' -ForegroundColor Green\""
        timeout: 10
      - type: command
        command: "powershell -Command \"Write-Host '✗ RED - Error message' -ForegroundColor Red\""
        timeout: 10
      - type: command
        command: "powershell -Command \"Write-Host '⚠ YELLOW - Warning message' -ForegroundColor Yellow\""
        timeout: 10
      - type: command
        command: "powershell -Command \"Write-Host 'ℹ BLUE - Info message' -ForegroundColor Blue\""
        timeout: 10
      - type: command
        command: "powershell -Command \"Write-Host '♦ MAGENTA - Debug message' -ForegroundColor Magenta\""
        timeout: 10
      - type: command
        command: "powershell -Command \"Write-Host '● CYAN - Highlight message' -ForegroundColor Cyan\""
        timeout: 10
      - type: command
        command: "powershell -Command \"Write-Host 'BOLD GREEN' -ForegroundColor Green -NoNewline; Write-Host ' and ' -NoNewline; Write-Host 'BOLD RED' -ForegroundColor Red\""
        timeout: 10
      - type: command
        command: "dotnet --version"
        timeout: 30
