tests:
  - id: color-test-demo
    category: "Demo"
    title: "Color Output Test"
    description: "Tests that ANSI colors render correctly in the log viewer"
    machine_mutating: false
    sort_order: 0
    steps:
      - type: command
        command: "powershell -Command \"$e=[char]27; Write-Output \\\"${e}[32m✓ GREEN - Success message${e}[0m\\\"\""
        timeout: 10
      - type: command
        command: "powershell -Command \"$e=[char]27; Write-Output \\\"${e}[31m✗ RED - Error message${e}[0m\\\"\""
        timeout: 10
      - type: command
        command: "powershell -Command \"$e=[char]27; Write-Output \\\"${e}[33m⚠ YELLOW - Warning message${e}[0m\\\"\""
        timeout: 10
      - type: command
        command: "powershell -Command \"$e=[char]27; Write-Output \\\"${e}[34mℹ BLUE - Info message${e}[0m\\\"\""
        timeout: 10
      - type: command
        command: "powershell -Command \"$e=[char]27; Write-Output \\\"${e}[35m♦ MAGENTA - Debug message${e}[0m\\\"\""
        timeout: 10
      - type: command
        command: "powershell -Command \"$e=[char]27; Write-Output \\\"${e}[36m● CYAN - Highlight message${e}[0m\\\"\""
        timeout: 10
      - type: command
        command: "powershell -Command \"$e=[char]27; Write-Output \\\"${e}[1;32mBOLD GREEN${e}[0m and ${e}[1;31mBOLD RED${e}[0m\\\"\""
        timeout: 10
      - type: command
        command: "dotnet --version"
        timeout: 30
