tests:
- id: nonnative-sdk-x86-basic
  category: Non-native SDK
  title: Non-native SDK tests (x86 on x64, etc.)
  description: Exercise console, desktop, and test templates under a non-native SDK scenario
  steps:
  - type: command
    command: dotnet --info
  - type: command
    command: dotnet new console -o test
  - type: command
    command: cd test
  - type: command
    command: dotnet build
  - type: command
    command: dotnet run
  - type: command
    command: cd ..
  - type: command
    command: dotnet new wpf -o mywpf
  - type: command
    command: cd mywpf
  - type: command
    command: dotnet build
  - type: command
    command: cd ..
  - type: command
    command: dotnet new winforms -o mywinforms
  - type: command
    command: cd mywinforms
  - type: command
    command: dotnet build
  - type: command
    command: cd ..
  - type: command
    command: dotnet new xunit -o Myxunit
  - type: command
    command: cd Myxunit
  - type: write_file
    path: UnitTest1.cs
    content: |
      namespace Myxunit;

      public class UnitTest1
      {
          [Fact]
          public void TestPass()
          {
              Assert.True(true);
          }

          [Fact]
          public void TestFail()
          {
              Assert.True(false);
          }

          [Fact(Skip = "Skipping this test for now")]
          public void TestSkip()
          {
              Assert.True(true);
          }
      }
  - type: command
    command: dotnet build
  - type: command
    command: dotnet test
    expected_exit_code: 1
  - type: command
    command: cd ..
  - type: command
    command: dotnet new nunit -o Myunit
  - type: command
    command: cd Myunit
  - type: write_file
    path: UnitTest1.cs
    content: |
      namespace Mynunit
      {
          public class Tests
          {
              [SetUp]
              public void Setup()
              {
              }

              [Test]
              public void Test_Pass()
              {
                  Assert.Pass("This test passed");
              }

              [Test]
              public void Test_Fail()
              {
                  Assert.Fail("This test failed");
              }

              [Test]
              [Ignore("This test is skipped")]
              public void Test_Skip()
              {
                  Assert.Pass("This test is skipped");
              }
          }
      }
  - type: command
    command: dotnet build
  - type: command
    command: dotnet test
    expected_exit_code: 1
  - type: command
    command: cd ..
  - type: command
    command: dotnet new mstest -o Mymstest
  - type: command
    command: cd Mymstest
  - type: write_file
    path: Test1.cs
    content: |
      namespace Mymstest;

      [TestClass]
      public sealed class Test1
      {
          [TestMethod]
          public void TestMethod1()
          {
              Assert.AreEqual(11, 11);
          }

          [TestMethod]
          public void TestMethod2()
          {
              Assert.AreEqual(12, 11);
          }

          [TestMethod]
          public void TestMethod3()
          {
              Assert.Inconclusive();
          }
      }
  - type: command
    command: dotnet build
  - type: command
    command: dotnet test
    expected_exit_code: 1
  - type: command
    command: cd ..
  - type: command
    command: dotnet new console -o f -lang f#
  - type: command
    command: cd f
  - type: command
    command: dotnet build
  - type: command
    command: dotnet run
  - type: command
    command: cd ..
  - type: command
    command: dotnet new console -o vb -lang vb
  - type: command
    command: cd vb
  - type: command
    command: dotnet build
  - type: command
    command: dotnet run
  sort_order: 29
