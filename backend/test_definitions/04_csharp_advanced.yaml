tests:
- id: cs-06-multi-tfm-console
  category: C# Advanced
  title: 6. Multi-TFM console app
  description: Create a C# console app targeting net10.0 and net48, then build and
    run both
  steps:
  - type: command
    command: dotnet new console -o f2
  - type: command
    command: cd f2
  - type: write_file
    path: f2.csproj
    content: "<Project Sdk=\"Microsoft.NET.Sdk\">\n  <PropertyGroup>\n    <OutputType>Exe</OutputType>\n\
      \    <TargetFrameworks>net10.0;net48</TargetFrameworks>\n    <ImplicitUsings>disable</ImplicitUsings>\n\
      \    <Nullable>enable</Nullable>\n    <LangVersion>latest</LangVersion>\n  </PropertyGroup>\n\
      </Project>\n"
  - type: write_file
    path: Program.cs
    content: 'using System;

      Console.WriteLine("Hello, World!");

      '
  - type: command
    command: dotnet build
  - type: command
    command: dotnet run -f net10.0
  - type: command
    command: dotnet run -f net48
  sort_order: 8
- id: cs-07-winforms-wpf-build
  category: C# Advanced
  title: 7. WinForms/WPF apps
  description: Create WinForms and WPF apps and build them without running them
  steps:
  - type: command
    command: dotnet new winforms -o w
  - type: command
    command: cd w
  - type: command
    command: dotnet build
  - type: command
    command: cd ..
  - type: command
    command: dotnet new wpf -o mywpf
  - type: command
    command: cd mywpf
  - type: command
    command: dotnet build
  sort_order: 9
