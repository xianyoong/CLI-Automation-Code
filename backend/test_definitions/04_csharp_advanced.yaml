tests:
- id: cs-06-multi-tfm-console
  category: C# Advanced
  title: 6. Multi-TFM console app
  description: Create a C# console app targeting net10.0 and net48, then build and run both
  steps:
  - type: command
    command: dotnet new console -o f2
  - type: command
    command: cd f2
  - type: write_file
    path: f2.csproj
    content: |
      <Project Sdk="Microsoft.NET.Sdk">
        <PropertyGroup>
          <OutputType>Exe</OutputType>
          <TargetFrameworks>net10.0;net48</TargetFrameworks>
          <ImplicitUsings>disable</ImplicitUsings>
          <Nullable>enable</Nullable>
          <LangVersion>latest</LangVersion>
        </PropertyGroup>
      </Project>
  - type: write_file
    path: Program.cs
    content: |
      using System;
      Console.WriteLine("Hello, World!");
  - type: command
    command: dotnet build
  - type: command
    command: dotnet run -f net10.0
  - type: command
    command: dotnet run -f net48
  sort_order: 8
- id: cs-07-winforms-wpf-build
  category: C# Advanced
  title: 7. WinForms/WPF apps
  description: Create WinForms and WPF apps, build and run them to verify the output windows (each window auto-closes after 10s)
  steps:
  - type: command
    command: dotnet new winforms -o w
  - type: command
    command: cd w
  - type: write_file
    path: Form1.cs
    content: |
      using System;
      using System.Windows.Forms;

      namespace w;

      public partial class Form1 : Form
      {
          public Form1()
          {
              InitializeComponent();
              var autoClose = new System.Windows.Forms.Timer { Interval = 10000 };
              autoClose.Tick += (s, e) => { autoClose.Stop(); Close(); };
              autoClose.Start();
          }
      }
  - type: command
    command: dotnet build
  - type: command
    command: dotnet run
  - type: command
    command: cd ..
  - type: command
    command: dotnet new wpf -o mywpf
  - type: command
    command: cd mywpf
  - type: write_file
    path: MainWindow.xaml.cs
    content: |
      using System;
      using System.Windows;
      using System.Windows.Threading;

      namespace mywpf;

      public partial class MainWindow : Window
      {
          public MainWindow()
          {
              InitializeComponent();
              var autoClose = new DispatcherTimer { Interval = TimeSpan.FromSeconds(10) };
              autoClose.Tick += (s, e) => { autoClose.Stop(); Close(); };
              autoClose.Start();
          }
      }
  - type: command
    command: dotnet build
  - type: command
    command: dotnet run
  sort_order: 9
