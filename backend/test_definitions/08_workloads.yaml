tests:
- id: workloads-maui-exe-install
  category: Workloads
  title: MAUI Workload (exe install)
  description: Install, update, list, and uninstall the MAUI workload
  machine_mutating: true
  steps:
  - type: command
    command: dotnet --info
  - type: command
    command: dotnet workload list
  - type: command
    command: dotnet workload install maui --skip-manifest-update
    timeout: 600
  - type: command
    command: dotnet workload list
    assert_output_contains:
    - maui
  - type: command
    command: dotnet workload update
    timeout: 600
  - type: command
    command: dotnet workload list
  - type: command
    command: dotnet workload uninstall maui
    timeout: 300
  - type: command
    command: dotnet workload list
  sort_order: 18
- id: workloads-maui-zip-install
  category: Workloads
  title: MAUI Workload (zip install)
  description: MAUI workload lifecycle against a zip-installed SDK. Pin the zip SDK's install folder via the "SDK folder" field before running so workloads use the file-based (zip) install type.
  machine_mutating: true
  steps:
  - type: command
    command: dotnet --info
  - type: command
    command: dotnet workload list
  - type: command
    command: dotnet workload install maui --skip-manifest-update
    timeout: 600
  - type: command
    command: dotnet workload list
    assert_output_contains:
    - maui
  - type: command
    command: dotnet workload update
    timeout: 600
  - type: command
    command: dotnet workload list
  - type: command
    command: dotnet workload uninstall maui
    timeout: 300
  - type: command
    command: dotnet workload list
  sort_order: 19
- id: workloads-wasm-tools-zip-install
  category: Workloads
  title: Wasm-tools Workload (zip install)
  description: Install and uninstall the wasm-tools workload against a zip-installed SDK. Pin the zip SDK's install folder via the "SDK folder" field before running.
  machine_mutating: true
  steps:
  - type: command
    command: dotnet --info
  - type: command
    command: dotnet workload list
  - type: command
    command: dotnet workload install wasm-tools
    timeout: 600
  - type: command
    command: dotnet workload list
    assert_output_contains:
    - wasm-tools
  - type: command
    command: dotnet workload uninstall wasm-tools
    timeout: 300
  - type: command
    command: dotnet workload list
  sort_order: 20
- id: workloads-scenario-1-search
  category: Workloads
  title: Workload Scenario 1
  description: Inspect workload info, installed workloads, and searchable workload
    manifests
  machine_mutating: true
  steps:
  - type: command
    command: dotnet --info
  - type: command
    command: dotnet workload list
  - type: command
    command: dotnet workload search
  sort_order: 21
- id: workloads-scenario-2-wasm-android
  category: Workloads
  title: 'Workload Scenario 2: wasm-tools + android'
  description: Install wasm-tools and android, publish a Blazor WASM app, repair,
    and uninstall workloads
  machine_mutating: true
  steps:
  - type: command
    command: dotnet --info
  - type: command
    command: dotnet workload list
  - type: command
    command: dotnet workload install wasm-tools --skip-manifest-update
    timeout: 600
  - type: command
    command: dotnet workload install android --skip-manifest-update
    timeout: 600
  - type: command
    command: dotnet workload list
  - type: command
    command: dotnet new blazorwasm -o mywasm
  - type: command
    command: cd mywasm
  - type: command
    command: dotnet publish -o 1p0
    timeout: 300
  - type: command
    command: dotnet workload repair
    timeout: 300
  - type: command
    command: dotnet workload uninstall wasm-tools
    timeout: 300
  - type: command
    command: dotnet workload uninstall android
    timeout: 300
  - type: command
    command: dotnet workload list
  sort_order: 22
